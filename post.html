<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดข่าว - Thai School V.5</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* บังคับฟอนต์ทั้งหน้า */
        * { font-family: 'Anakotmai', sans-serif !important; }
        
        /* สร้างช่องว่างให้ตัวหนังสือไม่ติดขอบจอ */
        .article-body {
            padding: 0 25px; /* ดันเนื้อหาซ้าย-ขวา 25px */
            margin-bottom: 60px;
        }
        
        .article-body h1 {
            font-size: 1.6rem;
            line-height: 1.4;
            margin-top: 20px;
        }

        .article-body p.date {
            color: #888;
            font-size: 0.9rem;
            margin: 10px 0 20px 0;
        }

        .article-text {
            font-size: 1.1rem;
            line-height: 1.8;
            color: #333;
            word-wrap: break-word; /* ป้องกันตัวหนังสือยาวเกินจนดันขอบ */
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Thai School V.5</a>
        <ul class="nav-links">
            <li><a href="index.html">หน้าแรก</a></li>
            <li><a href="index.html#news">ข่าวสาร</a></li> 
            <li><a href="personnel.html">บุคลากร</a></li>
            <li><a href="contact.html">ติดต่อเรา</a></li>
        </ul>
    </nav>

    <div class="container" id="full-post" style="max-width: 800px; margin: auto; padding-top: 30px;">
        </div>

    <script>
        async function loadFullPost() {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch('news.json');
            const data = await res.json();
            const post = data.find(p => p.id == id);

            if(post) {
                document.getElementById('full-post').innerHTML = `
                    <div class="article-body">
                        <img src="${post.img}" style="width:100%; border-radius:15px; box-shadow: var(--shadow); display: block;">
                        <h1>${post.title}</h1>
                        <p class="date">วันที่เผยแพร่: ${post.date}</p>
                        <hr style="margin:20px 0; border: 0; border-top: 1px solid #eee;">
                        <div class="article-text">
                            ${post.desc}
                        </div>
                        <br><br>
                        <a href="index.html" style="text-decoration:none; color:var(--primary); font-weight:bold; border: 1.5px solid var(--primary); padding: 10px 25px; border-radius: 30px; display: inline-block;">
                            ← กลับหน้าแรก
                        </a>
                    </div>
                `;
            } else {
                document.getElementById('full-post').innerHTML = `<div class="article-body"><h2>ไม่พบข้อมูลข่าวสาร</h2></div>`;
            }
        }

        window.onload = loadFullPost;
    </script>
</body>
</html>
