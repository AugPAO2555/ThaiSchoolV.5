<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดข่าว - Thai School V.5</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* ดักคอทุกจุด ห้ามติดขอบ */
        * { 
            font-family: 'Anakotmai', sans-serif !important; 
            box-sizing: border-box;
        }
        body { 
            background-color: #f9f9f9; 
            margin: 0; 
            padding: 0;
        }
        /* บังคับ Navbar ให้มีที่ว่างซ้ายขวา */
        nav {
            padding: 1rem 5% !important;
        }
        /* ตัวควบคุมเนื้อหาข่าว ห้ามชิดขอบจอเด็ดขาด */
        .news-wrapper {
            max-width: 800px;
            margin: 0 auto;
            padding: 30px 25px !important; /* ดันซ้าย-ขวา 25px แบบบังคับ */
        }
        .news-wrapper img {
            width: 100%;
            border-radius: 15px;
            margin-bottom: 25px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        .news-wrapper h1 {
            font-size: 1.7rem;
            line-height: 1.4;
            margin-bottom: 10px;
        }
        .news-wrapper .date {
            color: #888;
            margin-bottom: 20px;
        }
        .news-wrapper .content {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #333;
            word-wrap: break-word;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Thai School V.5</a>
        <ul class="nav-links">
            <li><a href="index.html">หน้าแรก</a></li>
            <li><a href="index.html#news">ข่าวสาร</a></li> 
            <li><a href="personnel.html">บุคลากร</a></li>
            <li><a href="contact.html">ติดต่อเรา</a></li>
        </ul>
    </nav>

    <div id="full-post" class="news-wrapper">
        </div>

    <script>
        async function loadFullPost() {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch('news.json');
            const data = await res.json();
            const post = data.find(p => p.id == id);

            if(post) {
                // พ่นข้อมูลออกมาโดยตรง ไม่ต้องมี div ซ้อนเยอะเกินไป
                document.getElementById('full-post').innerHTML = `
                    <img src="${post.img}">
                    <h1>${post.title}</h1>
                    <p class="date">เผยแพร่เมื่อ: ${post.date}</p>
                    <hr style="margin:20px 0; border: 0; border-top: 1px solid #eee;">
                    <div class="content">
                        ${post.desc}
                    </div>
                    <br><br>
                    <a href="index.html" style="text-decoration:none; color:var(--primary); font-weight:bold; border: 2px solid var(--primary); padding: 10px 25px; border-radius: 50px; display: inline-block;">
                        ← กลับหน้าแรก
                    </a>
                `;
            } else {
                document.getElementById('full-post').innerHTML = `<h2>ไม่พบข้อมูลข่าวสาร</h2><a href="index.html">กลับหน้าหลัก</a>`;
            }
        }
        window.onload = loadFullPost;
    </script>
</body>
</html>
