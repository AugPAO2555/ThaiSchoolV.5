<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>รายละเอียดข่าว - Thai School V.5</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* บังคับฟอนต์ทั้งหน้า */
        * { font-family: 'Anakotmai', sans-serif !important; }

        /* แก้ไข Container หลักให้มีระยะห่างจากขอบจอ (หัวใจสำคัญ) */
        .container-fixed {
            max-width: 800px;
            margin: auto;
            padding: 30px 20px; /* ดันเนื้อหาทุกอย่างออกจากขอบซ้าย-ขวา 20px */
        }

        .article-title {
            font-size: 1.7rem;
            line-height: 1.4;
            margin: 20px 0 10px 0;
            font-weight: 700;
        }

        .article-date {
            color: #888;
            font-size: 0.95rem;
            margin-bottom: 20px;
        }

        .article-text {
            font-size: 1.15rem;
            line-height: 1.8;
            color: #333;
            word-wrap: break-word;
            margin-bottom: 40px;
        }

        /* ตกแต่งปุ่มให้ดูแพง */
        .btn-return {
            text-decoration: none;
            color: var(--primary);
            font-weight: bold;
            border: 2px solid var(--primary);
            padding: 10px 25px;
            border-radius: 50px;
            display: inline-block;
            transition: 0.3s;
        }
        .btn-return:hover {
            background: var(--primary);
            color: white;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Thai School V.5</a>
        <ul class="nav-links">
            <li><a href="index.html">หน้าแรก</a></li>
            <li><a href="index.html#news">ข่าวสาร</a></li> 
            <li><a href="personnel.html">บุคลากร</a></li>
            <li><a href="contact.html">ติดต่อเรา</a></li>
        </ul>
    </nav>

    <div class="container-fixed" id="full-post">
        </div>

    <script>
        async function loadFullPost() {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch('news.json');
            const data = await res.json();
            const post = data.find(p => p.id == id);

            if(post) {
                document.getElementById('full-post').innerHTML = `
                    <img src="${post.img}" style="width:100%; border-radius:20px; box-shadow: var(--shadow); display: block;">
                    <h1 class="article-title">${post.title}</h1>
                    <p class="article-date">เผยแพร่เมื่อ: ${post.date}</p>
                    <hr style="margin:20px 0; border: 0; border-top: 1px solid #eee;">
                    <div class="article-text">
                        ${post.desc}
                    </div>
                    <a href="index.html" class="btn-return">← กลับหน้าแรก</a>
                `;
            } else {
                document.getElementById('full-post').innerHTML = `<h2>ไม่พบข้อมูลข่าวสาร</h2><br><a href="index.html">กลับหน้าแรก</a>`;
            }
        }

        window.onload = loadFullPost;
    </script>
</body>
</html>
