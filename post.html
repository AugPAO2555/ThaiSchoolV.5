<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>รายละเอียดข่าว - Thai School V.5</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* บังคับล้างค่า Margin/Padding พื้นฐานของเบราว์เซอร์ */
        html, body { margin: 0; padding: 0; overflow-x: hidden; width: 100%; }
        * { font-family: 'Anakotmai', sans-serif !important; box-sizing: border-box !important; }
        
        /* สร้างกล่องเปล่ารอไว้ */
        #full-post { width: 100%; margin: 0 auto; }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Thai School V.5</a>
        <ul class="nav-links">
            <li><a href="index.html">หน้าแรก</a></li>
            <li><a href="index.html#news">ข่าวสาร</a></li> 
            <li><a href="personnel.html">บุคลากร</a></li>
            <li><a href="contact.html">ติดต่อเรา</a></li>
        </ul>
    </nav>

    <div id="full-post"></div>

    <script>
        async function loadFullPost() {
            const id = new URLSearchParams(window.location.search).get('id');
            const res = await fetch('news.json');
            const data = await res.json();
            const post = data.find(p => p.id == id);

            if(post) {
                // ใช้สไตล์แบบยัดไส้ (Inline Style) เพื่อไม่ให้ CSS ภายนอกมาดึงไปติดขอบ
                document.getElementById('full-post').innerHTML = `
                    <div style="padding: 25px 25px 80px 25px; max-width: 800px; margin: 0 auto;">
                        <img src="${post.img}" style="width:100%; border-radius:15px; display:block; margin-bottom:20px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
                        <h1 style="font-size:1.7rem; line-height:1.4; margin:0 0 10px 0; color:#111;">${post.title}</h1>
                        <p style="color:#888; font-size:0.9rem; margin-bottom:20px;">เผยแพร่เมื่อ: ${post.date}</p>
                        <hr style="margin:20px 0; border:0; border-top:1px solid #eee;">
                        <div style="font-size:1.1rem; line-height:1.8; color:#333; word-wrap:break-word; overflow-wrap:break-word;">
                            ${post.desc}
                        </div>
                        <br><br>
                        <a href="index.html" style="text-decoration:none; color:white; background:#00a859; padding:12px 30px; border-radius:50px; display:inline-block; font-weight:bold;">
                            ← กลับหน้าแรก
                        </a>
                    </div>
                `;
            } else {
                document.getElementById('full-post').innerHTML = `<div style="padding:50px; text-align:center;"><h2>ไม่พบข้อมูล</h2><a href="index.html">กลับหน้าหลัก</a></div>`;
            }
        }
        window.onload = loadFullPost;
    </script>
</body>
</html>
