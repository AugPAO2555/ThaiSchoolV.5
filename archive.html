<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบเอกสาร | Thai School V.5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="top-notify" class="top-banner"></div>

    <nav>
        <a href="index.html" class="logo">Thai School V.5</a>
        <ul class="nav-links">
            <li><a href="index.html">หน้าแรก</a></li>
            <li><a href="index.html#news">ข่าวสาร</a></li>
            <li><a href="personnel.html">บุคลากร</a></li>
            <li><a href="contact.html">ติดต่อเรา</a></li>
        </ul>
    </nav>

    <main class="container" style="min-height: 80vh;">
        <h2 class="title-border">ตรวจสอบเอกสาร</h2>

        <div class="verify-box">
            <div class="input-field-group">
                <label>หน่วยงานที่ออกเอกสาร</label>
                <select id="agency-select" onchange="updateDocTypes()">
                    <option value="">-- เลือกหน่วยงาน --</option>
                    <option value="school">โรงเรียนกราชวิทยา</option>
                    <option value="military">กองทัพบก</option>
                    <option value="police">สำนักงานตำรวจภูธรพระนครศรีอยุธยา</option>
                </select>
            </div>

            <div class="input-field-group">
                <label>ประเภทเอกสาร</label>
                <select id="doc-type-select" onchange="showExtraFields()">
                    <option value="">-- โปรดเลือกหน่วยงานก่อน --</option>
                </select>
            </div>

            <div id="extra-inputs" style="display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 15px;"></div>

            <div class="input-field-group">
                <label>ชื่อผู้ใช้ Roblox (Username)</label>
                <input type="text" id="roblox-username" placeholder="กรอกชื่อผู้ใช้...">
            </div>

            <button class="btn-verify-modern" onclick="verifyDocument()">เริ่มการตรวจสอบ</button>
        </div>

        <div id="verify-result-area"></div>
    </main>

    <div id="status-overlay" class="modal">
        <div class="modal-content" style="text-align: center; max-width: 400px;">
            <div class="loading-container">
                <div id="load-bar" style="width: 0%; height: 100%; background: #00a859; transition: 0.3s;"></div>
            </div>
            <h3 id="status-title">กำลังตรวจสอบ</h3>
            <p id="status-msg">เตรียมการเชื่อมต่อระบบ...</p>
            <button id="status-btn" class="btn-close-modal" onclick="closeStatus()" style="display: none;">ตกลง</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
