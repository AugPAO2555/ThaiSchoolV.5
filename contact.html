<!DOCTYPE html>
<html lang="th">
    <footer class="main-footer">
        <div class="container" style="text-align: center;">
            <div class="footer-links">
                <span>ติดตามเราได้ที่: </span>
                <a href="#" target="_blank" class="link-discord">Discord</a> | 
                <a href="#" target="_blank" class="link-roblox">Roblox Group</a> | 
                <a href="#" target="_blank" class="link-map">Roblox Map</a>
            </div>
            <p class="copyright">© 2026 Thai School V.5 สงวนลิขสิทธิ์ทุกประการ</p>
        </div>
    </footer>

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ติดต่อเรา | Thai School V.5</title>
    <link rel="stylesheet" href="style.css">
    <style>
        .contact-form {
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: var(--shadow);
            max-width: 600px;
            margin: 0 auto;
        }
        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; margin-bottom: 8px; font-weight: bold; }
        .form-group input, .form-group textarea {
            width: 100%;
            padding: 12px;
            border: 1px solid #ddd;
            border-radius: 8px;
            font-family: 'Anakotmai', sans-serif;
        }
        .btn-submit {
            background: var(--primary);
            color: white;
            border: none;
            padding: 15px 30px;
            border-radius: 50px;
            font-weight: bold;
            cursor: pointer;
            width: 100%;
            font-size: 1rem;
        }
    </style>
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Thai School V.5</a>
        <ul class="nav-links">
            <li><a href="index.html">หน้าแรก</a></li>
            <li><a href="index.html#news">ข่าวสาร</a></li>
            <li><a href="personnel.html">บุคลากร</a></li>
            <li><a href="contact.html">ติดต่อเรา</a></li>
        </ul>
    </nav>

    <main class="container">
        <h2 class="title-border">ติดต่อสอบถาม</h2>
        <div class="contact-form">
            <form id="contactForm">
                <div class="form-group">
                    <label>ชื่อบัญชีโรบล็อค</label>
                    <input type="text" id="sender_name" placeholder="ระบุชื่อของคุณ" required>
                </div>
                <div class="form-group">
                    <label>หัวข้อติดต่อ</label>
                    <input type="text" id="subject" placeholder="ต้องการติดต่อเรื่องอะไร" required>
                </div>
                <div class="form-group">
                    <label>รายละเอียด</label>
                    <textarea id="message" rows="5" placeholder="พิมพ์ข้อความของคุณที่นี่..." required></textarea>
                </div>
                <button type="submit" class="btn-submit" id="submitBtn">ส่งข้อความ</button>
            </form>
        </div>
    </main>

    <script>
        document.getElementById('contactForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn');
            const webhookUrl = "https://discord.com/api/webhooks/1496358400769003731/9s-iPDSSl98J84QAv3_vLbMiGtz7eQ3owfMlpxgWQXhZQ32j9UpxAgn7H49RuH1-b5Cc";

            const payload = {
                username: "Thai School Contact Bot",
                embeds: [{
                    title: "📩 มีข้อความติดต่อใหม่จากเว็บไซต์",
                    color: 3066993, // สีเขียว
                    fields: [
                        { name: "👤 ผู้ส่ง", value: document.getElementById('sender_name').value },
                        { name: "📌 หัวข้อ", value: document.getElementById('subject').value },
                        { name: "💬 ข้อความ", value: document.getElementById('message').value }
                    ],
                    footer: { text: "ส่งเมื่อ: " + new Date().toLocaleString('th-TH') }
                }]
            };

            btn.disabled = true;
            btn.innerText = "กำลังส่ง...";

            try {
                await fetch(webhookUrl, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                alert('ส่งข้อความสำเร็จ! ขอบคุณที่ติดต่อเรา');
                document.getElementById('contactForm').reset();
            } catch (err) {
                alert('เกิดข้อผิดพลาด กรุณาลองใหม่ภายหลัง');
            } finally {
                btn.disabled = false;
                btn.innerText = "ส่งข้อความ";
            }
        });
    </script>
</body>
</html>
