<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบเอกสารราชการ | Thai School V.5</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* สไตล์เพิ่มเติมเฉพาะหน้าตรวจสอบ */
        .search-section {
            background: var(--gray);
            padding: 30px;
            border-radius: 15px;
            margin-bottom: 30px;
            box-shadow: var(--shadow);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            font-weight: bold;
            display: block;
            margin-bottom: 8px;
            color: #333;
        }

        .form-control {
            width: 100%;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #ddd;
            font-size: 1rem;
            outline: none;
        }

        .form-control:focus {
            border-color: var(--primary);
        }

        /* ระบบแจ้งเตือน Overlay */
        .verify-status-overlay {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.8);
            z-index: 3000;
            justify-content: center; align-items: center;
            backdrop-filter: blur(5px);
        }

        .status-card {
            background: white;
            padding: 40px 30px;
            border-radius: 20px;
            width: 90%;
            max-width: 450px;
            text-align: center;
            position: relative;
            overflow: hidden;
            animation: slideUp 0.3s ease-out;
        }

        .loading-bar {
            position: absolute;
            top: 0; right: 0;
            height: 6px;
            width: 100%;
            transition: width 2s linear;
        }

        .bg-success { background-color: var(--primary); }
        .bg-error { background-color: var(--error); }

        .status-icon { font-size: 60px; margin-bottom: 20px; display: block; }

        .btn-status {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 50px;
            border-radius: 10px;
            font-weight: bold;
            cursor: pointer;
            margin-top: 20px;
            transition: 0.3s;
        }
        
        .btn-status:hover {
            opacity: 0.9;
            transform: translateY(-2px);
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Thai School V.5</a>
        <ul class="nav-links">
            <li><a href="index.html">หน้าแรก</a></li>
            <li><a href="personnel.html">บุคลากร</a></li>
            <li><a href="verify.html">ตรวจสอบเอกสาร</a></li>
        </ul>
    </nav>

    <div class="container" style="max-width: 800px; margin: 50px auto; padding: 0 20px;">
        <h2 class="title-border" style="margin-bottom: 30px;">ระบบตรวจสอบเอกสารราชการส่วนกลาง</h2>

        <div class="search-section">
            <div class="form-group">
                <label>คุณต้องการที่จะตรวจสอบเอกสารของหน่วยงานใด</label>
                <select id="department-select" class="form-control">
                    <option value="school">โรงเรียนกราซวิทยา (ปพ.1 - ปพ.7)</option>
                    <option value="military">การเกณฑ์ทหาร กองการสัสดี (สด.8, 9, 35, 43)</option>
                    <option value="police">สถานีตำรวจภูธรพระนครศรีอยุธยา (ใบขับขี่)</option>
                </select>
            </div>

            <div class="form-group">
                <label>ชื่อผู้ใช้ Roblox (Roblox Username):</label>
                <input type="text" id="roblox-username" class="form-control" placeholder="กรอกชื่อผู้ใช้ให้ถูกต้องเพื่อค้นหา...">
            </div>

            <button class="btn-status" onclick="verifyDocument()" style="width: 100%; font-size: 1.1rem;">เริ่มการตรวจสอบ</button>
        </div>

        <div id="verify-result"></div>
    </div>

    <div id="status-overlay" class="verify-status-overlay">
        <div class="status-card">
            <div id="load-bar" class="loading-bar"></div>
            <span id="status-icon" class="status-icon">🔍</span>
            <h3 id="status-title" class="status-title" style="margin-bottom: 10px;">กำลังตรวจสอบ</h3>
            <p id="status-msg" class="status-msg" style="color: #666; line-height: 1.6;"></p>
            <button id="status-btn" class="btn-status" onclick="closeStatus()" style="display: none;">ตกลง</button>
        </div>
    </div>

    <script src="script.js"></script>

</body>
</html>
