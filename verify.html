<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ตรวจสอบเอกสาร | Thai School V.5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Thai School V.5</a>
        <ul class="nav-links">
            <li><a href="index.html">หน้าแรก</a></li>
            <li><a href="index.html#news">ข่าวสาร</a></li>
            <li><a href="personnel.html">บุคลากร</a></li>
            <li><a href="contact.html">ติดต่อเรา</a></li>
        </ul>
    </nav>

    <main class="container" style="min-height: 80vh;">
        <h2 class="title-border">ตรวจสอบเอกสาร</h2>
        
        <div class="verify-box">
            <div class="input-field-group">
                <label>หน่วยงานที่ออกเอกสาร</label>
                <select id="agency-select">
                    <option value="school">โรงเรียนกราชวิทยา (การศึกษา)</option>
                    <option value="military">กองทัพบก (ทะเบียนทหาร/รด.)</option>
                </select>
            </div>

            <div class="input-field-group">
                <label>ชื่อผู้ใช้ Roblox (Username)</label>
                <input type="text" id="roblox-username" placeholder="กรอกชื่อผู้ใช้เพื่อค้นหา...">
            </div>

            <button class="btn-verify-modern" onclick="verifyDocument()">เริ่มการตรวจสอบ</button>
        </div>

        <div id="verify-result-area"></div>
    </main>

    <div id="status-overlay" class="modal" style="display:none; background: rgba(0,0,0,0.5);">
        <div class="modal-content" style="text-align: center; max-width: 400px;">
            <div class="loading-container" style="background: #eee; height: 8px; border-radius: 10px; overflow: hidden; margin-bottom: 20px;">
                <div id="load-bar" style="background: var(--primary); width: 0%; height: 100%; transition: 0.3s;"></div>
            </div>
            <h3 id="status-title" style="margin-bottom: 10px;">กำลังตรวจสอบ</h3>
            <p id="status-msg" style="color: #777; font-size: 0.9rem;">เตรียมการเชื่อมต่อระบบ...</p>
            <button id="status-btn" class="btn-close-modal" onclick="closeStatus()" style="display: none;">ตกลง</button>
        </div>
    </div>

    <footer class="main-footer">
        <div class="container" style="text-align: center;">
            <div class="footer-links">
                <span>ติดตามเราได้ที่: </span>
                <a href="https://discord.gg/3W7YecYCAT" target="_blank" class="link-discord">Discord</a> | 
                <a href="https://www.roblox.com/th/communities/34820923/ThaiSchool-V4#!/about" target="_blank" class="link-roblox">Roblox Group</a> | 
                <a href="https://www.roblox.com/th/games/84066328709254/13-2547-Reborn" target="_blank" class="link-map">Roblox Map</a>
            </div>
            <p class="copyright">© 2026 Thai School V.5 สงวนลิขสิทธิ์ทุกประการ</p>
        </div>
    </footer>

    <script src="script.js"></script>
</body>
</html>
