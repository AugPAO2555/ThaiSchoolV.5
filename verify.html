<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ระบบตรวจสอบเอกสารราชการ | Thai School V.5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav>
        <a href="index.html" class="logo">Thai School V.5</a>
        <ul class="nav-links">
            <li><a href="index.html">หน้าแรก</a></li>
            <li><a href="index.html#news">ประชาสัมพันธ์</a></li>
            <li><a href="personnel.html">บุคลากร</a></li>
            <li><a href="contact.html">ติดต่อเรา</a></li>
        </ul>
    </nav>

    <div class="verify-container">
        <h2 class="title-border">ระบบตรวจสอบเอกสารราชการส่วนกลาง</h2>

        <div class="search-section">
            <div class="input-field-group">
                <label>หน่วยงานที่ออกเอกสาร:</label>
                <select id="agency-select">
                    <option value="school">โรงเรียนกราชวิทยา (การศึกษา)</option>
                    <option value="police">สำนักงานตำรวจภูธรพระนครศรีอยุธยา</option>
                    <option value="military">กองทัพบก (งานทะเบียนทหาร)</option>
                </select>
            </div>

            <div class="input-field-group">
                <label>ประเภทเอกสาร:</label>
                <select id="doc-type">
                    <option value="pp1">ปพ.1 - ระเบียนแสดงผลการเรียน</option>
                    <option value="pp2">ปพ.2 - ประกาศนียบัตร</option>
                    <option value="pp3">ปพ.3 - แบบรายงานผู้สำเร็จการศึกษา</option>
                    <option value="pp7">ปพ.7 - ใบรับรองสถานภาพนักเรียน</option>
                    <option value="military-doc">สด.8 / สด.9 / สด.35 / สด.43</option>
                    <option value="other">เอกสารราชการอื่นๆ</option>
                </select>
            </div>

            <div class="input-field-group">
                <label>ชื่อผู้ใช้บัญชี Roblox (Username):</label>
                <input type="text" id="roblox-username" placeholder="กรอกชื่อผู้ใช้เพื่อค้นหาข้อมูล...">
            </div>

            <button class="btn-verify-modern" onclick="verifyDocument()">เริ่มการตรวจสอบ</button>
            
            <div id="verify-result-area"></div>
        </div>
    </div>

    <div id="status-overlay" class="verify-status-overlay">
        <div class="status-card">
            <div id="load-bar" class="loading-bar"></div>
            <span id="status-icon" class="status-icon">🔍</span>
            <h3 id="status-title">กำลังตรวจสอบ</h3>
            <p id="status-msg"></p>
            <button id="status-btn" class="btn-verify-modern" onclick="closeStatus()" style="display: none;">ตกลง</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
