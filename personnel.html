<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>บุคลากร | Thai School V.5</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">Thai School V.5</a>
        <ul class="nav-links">
            <li><a href="index.html">หน้าแรก</a></li>
            <li><a href="personnel.html">บุคลากร</a></li>
            <li><a href="archive.html">ตรวจสอบเอกสาร</a></li>
        </ul>
    </nav>

    <div class="container" style="margin-bottom: 50px;">
        <h2 class="title-border">คณะผู้บริหารและผู้ก่อตั้ง</h2>
        <div class="p-grid" id="founder-list"></div>

        <h2 class="title-border">บุคลากรโรงเรียนกราซวิทยา</h2>
        <div class="p-grid" id="school-list"></div>

        <h2 class="title-border">สำนักงานตำรวจภูธรพระนครศรีอยุธยา</h2>
        <div class="p-grid" id="police-list"></div>
    </div>

    <div class="modal" id="bio-modal">
        <div class="modal-content">
            <h2 id="m-name" style="margin-bottom:5px; color: var(--dark);"></h2>
            <p id="m-role" style="color: var(--primary); font-weight: bold; margin-bottom: 2px;"></p>
            <p id="m-dept" style="color: #64748b; font-size: 0.85rem; margin-bottom: 15px;"></p>
            <p id="m-bio" style="line-height: 1.6; margin-bottom: 20px; font-size: 0.95rem; color: #334155;"></p>

            <div class="modal-header-tag">ประวัติการศึกษา</div>
            <div id="m-edu-list" class="bio-list"></div>

            <div class="modal-header-tag">ประวัติการทำงาน</div>
            <div id="m-exp-list" class="bio-list"></div>

            <p style="color: #dc2626; font-weight: bold; text-align: left; margin-top: 25px; font-size: 0.8rem; border-top: 1px dashed #e2e8f0; padding-top: 15px;">
                * เป็นการจำลองสวมบทบาทในเกมเพียงเท่านั้น !!
            </p>
            <button class="btn-close-modal" onclick="closeModal()">ปิดหน้าต่าง</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
